<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#02020a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TETRIS // NEON</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="bg"></canvas>

  <!-- Mobile top bar (hidden on desktop) -->
  <div id="mobile-topbar">
    <div id="mobile-stats">
      <div class="ms-item"><div class="ms-label">SCORE</div><div class="ms-value" id="m-score">0</div></div>
      <div class="ms-item"><div class="ms-label">BEST</div><div class="ms-value" id="m-best">0</div></div>
      <div class="ms-item"><div class="ms-label">LEVEL</div><div class="ms-value" id="m-level">1</div></div>
      <div class="ms-item"><div class="ms-label">LINES</div><div class="ms-value" id="m-lines">0</div></div>
    </div>
    <div id="mobile-actions">
      <button class="mac-btn" id="mac-restart">↺</button>
      <button class="mac-btn" id="mac-pause">❚❚</button>
      <button class="mac-btn" id="mac-mute">🔊</button>
    </div>
  </div>

  <div id="wrapper">

    <div id="left-panel">
      <div class="panel-box anim-in" style="--delay:0.05s">
        <div class="panel-label">SCORE</div>
        <div class="panel-value" id="score">0</div>
      </div>
      <div class="panel-box anim-in" style="--delay:0.12s">
        <div class="panel-label">BEST</div>
        <div class="panel-value" id="highscore">0</div>
      </div>
      <div class="panel-box anim-in" style="--delay:0.19s">
        <div class="panel-label">LEVEL</div>
        <div class="panel-value" id="level">1</div>
      </div>
      <div class="panel-box anim-in" style="--delay:0.26s">
        <div class="panel-label">LINES</div>
        <div class="panel-value" id="lines">0</div>
      </div>

      <div class="btn-stack anim-in" style="--delay:0.33s">
        <button class="btn primary" id="btn-restart" type="button">
          <span class="btn-icon">↺</span><span>RESTART</span>
        </button>
        <button class="btn" id="btn-pause" type="button">
          <span class="btn-icon" id="btn-pause-icon">❚❚</span><span id="btn-pause-label">PAUSE</span>
        </button>
        <button class="btn ghost" id="btn-mute" type="button">
          <span class="btn-icon" id="btn-mute-icon">🔊</span><span id="btn-mute-label">SOUND</span>
        </button>
      </div>
    </div>

    <div id="canvas-wrap" class="anim-in" style="--delay:0.0s">
      <canvas id="canvas" width="300" height="600"></canvas>
      <div id="overlay" class="visible">
        <div id="overlay-title">TETRIS</div>
        <div id="overlay-sub">NEON EDITION</div>
        <button class="btn primary big" id="btn-start" type="button">
          <span class="btn-icon">▶</span><span>START GAME</span>
        </button>
        <div id="overlay-msg">OR PRESS ANY KEY</div>
      </div>
    </div>

    <div id="right-panel">
      <div class="panel-box anim-in" style="--delay:0.05s">
        <div class="panel-label">NEXT</div>
        <canvas id="next-canvas" width="120" height="120"></canvas>
      </div>
      <div class="panel-box anim-in" id="hold-box" style="--delay:0.12s">
        <div class="panel-label">HOLD</div>
        <canvas id="hold-canvas" width="120" height="120"></canvas>
      </div>
      <div class="panel-box controls-box anim-in" style="--delay:0.19s">
        <div class="panel-label">CONTROLS</div>
        <div class="ctrl-line"><span class="key">←→</span> Move</div>
        <div class="ctrl-line"><span class="key">↑</span> Rotate</div>
        <div class="ctrl-line"><span class="key">↓</span> Soft drop</div>
        <div class="ctrl-line"><span class="key">Space</span> Hard drop</div>
        <div class="ctrl-line"><span class="key">C</span> Hold</div>
        <div class="ctrl-line"><span class="key">P</span> Pause</div>
        <div class="ctrl-line"><span class="key">R</span> Restart</div>
      </div>
    </div>

  </div>

  <!-- Mobile controls bar (shown only on small screens) -->
  <div id="mobile-controls">
    <div class="mc-top-row">
      <div class="mc-preview-wrap">
        <div class="mc-preview-label">HOLD</div>
        <canvas id="mc-hold-canvas" width="60" height="60"></canvas>
      </div>
      <div class="mc-center-btns">
        <button class="mc-btn mc-action" id="mc-hold" aria-label="Hold">
          <span class="mc-icon">C</span>
          <span class="mc-lbl">HOLD</span>
        </button>
        <button class="mc-btn mc-action mc-harddrop" id="mc-harddrop" aria-label="Hard Drop">
          <span class="mc-icon">⬇︎</span>
          <span class="mc-lbl">DROP</span>
        </button>
      </div>
      <div class="mc-preview-wrap">
        <div class="mc-preview-label">NEXT</div>
        <canvas id="mc-next-canvas" width="60" height="60"></canvas>
      </div>
    </div>
    <div class="mc-dpad">
      <div class="mc-dpad-row">
        <div class="mc-dpad-empty"></div>
        <button class="mc-btn mc-dir" id="mc-up" aria-label="Rotate">
          <span class="mc-icon">↻</span>
        </button>
        <div class="mc-dpad-empty"></div>
      </div>
      <div class="mc-dpad-row">
        <button class="mc-btn mc-dir" id="mc-left" aria-label="Left">
          <span class="mc-icon">◀</span>
        </button>
        <button class="mc-btn mc-dir mc-soft" id="mc-down" aria-label="Soft Drop">
          <span class="mc-icon">▼</span>
        </button>
        <button class="mc-btn mc-dir" id="mc-right" aria-label="Right">
          <span class="mc-icon">▶</span>
        </button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
